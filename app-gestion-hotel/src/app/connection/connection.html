<div class="login-wrapper">
  <div class="login-card">

    <div class="hotel-badge">
      <div class="hotel-icon">🏨</div>
      <div>
        <p class="hotel-name">Gestion Hôtel</p>
        <p class="hotel-sub">Espace administration</p>
      </div>
    </div>

    <h2>Connexion</h2>
    <p class="subtitle">Accédez à votre espace de gestion</p>

    <!-- Message d'erreur -->
    <div class="alert alert-error" *ngIf="messageErreur">
      {{ messageErreur }}
    </div>

    <form [formGroup]="connexionForm" (ngSubmit)="onSubmit()">
      
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="exemple@hotel.com"
          [class.input-error]="isInvalid('email')"
        />
        <span class="error-msg" *ngIf="isInvalid('email')">
          <span *ngIf="f['email'].errors?.['required']">L'email est obligatoire</span>
          <span *ngIf="f['email'].errors?.['email']">Format email invalide</span>
        </span>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.input-error]="isInvalid('password')"
        />
        <span class="error-msg" *ngIf="isInvalid('password')">
          <span *ngIf="f['password'].errors?.['required']">Le mot de passe est obligatoire</span>
          <span *ngIf="f['password'].errors?.['minlength']">Minimum 6 caractères</span>
        </span>
      </div>

      <button 
        type="submit" 
        class="btn-login"
        [disabled]="connexionForm.invalid || isLoading"
        [class.btn-disabled]="connexionForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">Connexion en cours...</span>
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span>ou</span>
      <div class="divider-line"></div>
    </div>

    <p class="register-link">
      Pas encore de compte ?
      <a routerLink="/inscription">Créer un compte</a>
    </p>

  </div>
</div>
